trigger:
  branches:
    include:
    - main
stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      name: Azure pipelines
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |-
          # Write your PowerShell commands here.

          Test-Connection 10.3.122.48 -Count 2

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          echo "==========================================="
          echo "   Agent Network, Identity & Timestamp Diagnostics"
          echo "==========================================="

          echo ""
          echo ">>> UTC Timestamp:"
          UTC_TIME=$(date -u)
          echo $UTC_TIME

          echo ""
          echo ">>> Local Timestamp:"
          LOCAL_TIME=$(date)
          echo $LOCAL_TIME

          echo ""
          echo ">>> Agent Public IP:"
          AGENT_IP=$(curl -s https://api.ipify.org)
          echo $AGENT_IP

          echo ""
          echo ">>> Agent Machine Info:"
          echo "Hostname: $(hostname)"

          echo ""
          echo ">>> Azure DevOps Pipeline Identity Context:"
          echo "Build ID: $(Build.BuildId)"
          echo "Build Number: $(Build.BuildNumber)"
          echo "Pipeline Name: $(Build.DefinitionName)"
          echo "Project: $(System.TeamProject)"
          echo "Stage: $(System.StageDisplayName)"
          echo "Job: $(Agent.JobName)"

          echo ""
          echo ">>> Service Connection / Identity Clues:"
          echo "Service Principal Client ID: $(ARM_CLIENT_ID)"
          echo "Tenant ID: $(ARM_TENANT_ID)"
          echo "Subscription ID: $(ARM_SUBSCRIPTION_ID)"

          echo ""
          echo ">>> OAuth Token (Sanitized Check):"
          if [ -n "$SYSTEM_ACCESSTOKEN" ]; then
              echo "System.AccessToken is PRESENT (pipeline authenticated via OAuth)"
          else
              echo "System.AccessToken is NOT present"
          fi

          echo ""
          echo ">>> Metadata Endpoint Check (Managed Identity Detection):"
          curl -s -H Metadata:true \
            "http://169.254.169.254/metadata/identity/info?api-version=2021-02-01" \
            && echo "" || echo "No Managed Identity available on agent (expected for hosted agents)"

          echo ""
          echo ">>> Composite Correlation Marker (COPY THIS):"
          echo "TIME_UTC=$UTC_TIME | IP=$AGENT_IP | BUILD_ID=$(Build.BuildId) | CLIENT_ID=$(ARM_CLIENT_ID)"

          echo ""
          echo "==========================================="
          displayName: "Log IP, Timestamp, and Identity (Deep Diagnostics)"
          env:
            ARM_CLIENT_ID: $(servicePrincipalId)
            ARM_TENANT_ID: $(tenantId)
            ARM_SUBSCRIPTION_ID: $(subscriptionId)