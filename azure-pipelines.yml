trigger:
  branches:
    include:
    - main
stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      name: Azure pipelines
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |-
          # Write your PowerShell commands here.

          Test-Connection 10.3.122.48 -Count 2

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          echo "==========================================="
          echo " Agent Network, Identity & Timestamp Diagnostics"
          echo "==========================================="

          echo ""
          echo ">>> UTC Timestamp:"
          UTC_TIME=$(date -u)
          echo $UTC_TIME

          echo ""
          echo ">>> Local Timestamp:"
          LOCAL_TIME=$(date)
          echo $LOCAL_TIME

          echo ""
          echo ">>> Agent Public IP:"
          AGENT_IP=$(curl -s https://api.ipify.org)
          echo $AGENT_IP

          echo ""
          echo ">>> Agent Info:"
          echo "Hostname: $(hostname)"

          echo ""
          echo ">>> Azure DevOps Context:"
          echo "Build ID: $(Build.BuildId)"
          echo "Pipeline: $(Build.DefinitionName)"
          echo "Job: $(Agent.JobName)"

          echo ""
          echo ">>> OAuth Token Check:"
          if [ -n "$SYSTEM_ACCESSTOKEN" ]; then
            echo "System.AccessToken PRESENT"
          else
            echo "System.AccessToken NOT present"
          fi

          echo ""
          echo ">>> Managed Identity Check (Metadata Endpoint):"
          MI_RESPONSE=$(curl -s -H Metadata:true \
            "http://169.254.169.254/metadata/identity/info?api-version=2021-02-01")

          echo $MI_RESPONSE

          if [[ "$MI_RESPONSE" == *"identity"* ]]; then
            echo "Managed Identity detected"
          else
            echo "No Managed Identity on agent (expected for hosted agent)"
          fi

          echo ""
          echo ">>> OIDC / Service Principal (Expected Identity Type):"
          echo "NOTE: If using Terraform OIDC (use_oidc=true), identity = Service Principal (NOT Managed Identity)"

          echo ""
          echo ">>> Composite Marker:"
          echo "TIME_UTC=$UTC_TIME | IP=$AGENT_IP | BUILD_ID=$(Build.BuildId)"

          echo "==========================================="
          displayName: "Log IP, Timestamp, Identity (Safe Version)"